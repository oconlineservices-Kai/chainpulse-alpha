name: Deploy to Fly.io
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install --legacy-peer-deps
        
      - name: Generate Prisma Client
        run: npx prisma generate
        
      - name: Clear Next.js build cache
        run: |
          rm -rf .next/cache
          echo "Cleared .next/cache"
        env:
          POST_BUILD_DEPLOY: "true"

      - name: Build
        run: npm run build
        env:
          NEON_DATABASE_URL: postgresql://build:build@localhost/build
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_URL: ${{ secrets.AUTH_URL }}
          NEXTAUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.AUTH_URL }}
          NEXT_PHASE: phase-production-build
          POST_BUILD_DEPLOY: "true"
          
      - name: Deploy to Fly.io with immediate strategy (replaces all machines)
        uses: superfly/flyctl-actions@1.4
        with:
          args: "deploy --remote-only --strategy immediate"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
