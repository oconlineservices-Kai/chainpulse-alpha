name: Deploy to Fly.io
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install --legacy-peer-deps
        
      - name: Generate Prisma Client
        run: npx prisma generate
        
      - name: Clear Next.js build cache
        run: |
          rm -rf .next/cache
          echo "Cleared .next/cache"
        env:
          POST_BUILD_DEPLOY: "true"

      - name: Build
        run: npm run build
        env:
          # Use dummy DB URL for build-time (real URL is a Fly.io secret at runtime)
          NEON_DATABASE_URL: postgresql://build:build@localhost/build
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_URL: ${{ secrets.AUTH_URL }}
          NEXTAUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.AUTH_URL }}
          # Signal to auth.ts to skip DB queries during static generation
          NEXT_PHASE: phase-production-build
          POST_BUILD_DEPLOY: "true"
          
      - name: Deploy to Fly.io
        uses: superfly/flyctl-actions@1.4
        with:
          args: "deploy --remote-only --strategy immediate"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Force restart all machines to ensure new image serves
        uses: superfly/flyctl-actions@1.4
        with:
          args: "apps restart chainpulse-alpha"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Wait for rollout and verify deployed image serves correct data
        run: |
          echo "Waiting for rollout..."
          sleep 15
          echo "Verifying API response with cache buster..."
          for i in 1 2 3; do
            echo "--- Check \"$i\" ---"
            RESULT=$(curl -s "https://chainpulsealpha.com/api/signals?t=$(date +%s)")
            WALLET_COUNT=$(echo "$RESULT" | python3 -c "import json,sys; d=json.load(sys.stdin); s=d['data']['signals'][0]; print(len(s.get('whaleWallets',[])))" 2>/dev/null || echo "error")
            FIRST_WALLET=$(echo "$RESULT" | python3 -c "import json,sys; d=json.load(sys.stdin); w=d['data']['signals'][0].get('whaleWallets',[]); print(w[0][:20] if w else 'NONE')" 2>/dev/null || echo "error")
            echo "  wallets=$WALLET_COUNT first=$FIRST_WALLET"
            sleep 5
          done
          echo "Deploy complete"
